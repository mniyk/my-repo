name: Literals
on: push
jobs:
    print:
        runs-on: ubuntu-latest
        steps:
            - run: printenv | grep 'LITERAL_'
              env:
                  LITERAL_NULL: ${{ null }}      # nullтъІ
                  LITERAL_BOOLEAN: ${{ true }}   # booleanтъІ
                  LITERAL_NUMBER: ${{ 1234 }}    # numberтъІ
                  LITERAL_STRING: ${{ 'Hello' }} # stringтъІ(жђџтИИУеўТ│Ћ)
                  LITERAL_OMIT_STRING: world     # stringтъІ(уюЂуЋЦУеўТ│Ћ)